name: Token benchmark

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: token-benchmark-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  token-benchmark:
    name: token savings replay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run token benchmark tests
        run: uv run pytest -m token_benchmark -v
        env:
          TOKEN_BENCHMARK_MIN_SAVINGS_PCT: "25"

      - name: Emit benchmark report
        run: |
          uv run python scripts/benchmark_token_savings_brain_mcp_hub_v1.py \
            --repo-root . \
            --fail-on-regression

      - name: Upload benchmark report artifact
        uses: actions/upload-artifact@v4
        with:
          name: token-benchmark-report
          path: .braindrain/plan-reports/token-benchmark-*.md
          if-no-files-found: error
