name: cursor-orchestration
version: "1"
description: Cursor multi-agent planning — rules, subagents, hooks, skills, and operational scripts.
agents:
  - cursor
rules:
  - braindrain
  - project-rules
skills:
  - coordinator
  - gitops
  - scriptlib-librarian
mcp_servers:
  - braindrain
operational_scripts:
  - daily_plan_audit
  - plan_build_guard
  - plan_meta_closeout
  - plan_provenance
  - plan_audit_history
# Subagents: all config/templates/agents/*.md (incl. daily-plan-auditor) deploy to .cursor/agents/ on prime.
capability_profiles:
  default_role: coordinator
  roles:
    coordinator:
      tool_profile: orchestration
