# BRAINDRAIN ruler.toml (Ruler v0.3+)
# See https://ai.intellectronica.net/ruler
#
# Rules are discovered from .ruler/AGENTS.md, .ruler/RULES.md, and sibling *.md files.
# Subagents (.cursor/agents/), hooks, skills, and slash commands are deployed by
# prime_workspace() — not managed by Ruler.
#
# BRAINDRAIN_LAUNCHER_PATH is substituted by install.sh / prime_workspace().

default_agents = [
  "cursor",
  "codex",
  "claude",
  "windsurf",
  "copilot",
  "zed",
  "aider",
  "opencode",
  "gemini-cli",
  "amp",
  "goose",
  "warp",
  "roo",
  "cline",
  "trae",
  "crush",
  "factory",
  "augmentcode",
  "amazonqcli",
  "qwen",
  "firebender",
  "mistral",
  "pi",
  "jetbrains-ai",
  "junie",
  "jules",
  "kilocode",
  "kiro",
  "openhands",
  "agentsmd",
  "antigravity",
]

# ── MCP server config propagation ────────────────────────────────────────────
# Ruler writes project-local MCP config for agents in default_agents (or --agents).
# BRAINDRAIN_LAUNCHER_PATH is replaced at deploy time.

[mcp_servers.braindrain]
command = "BRAINDRAIN_LAUNCHER_PATH"
args = []
env = {}

[mcp_servers.mattermost]
command = "npx"
args = ["-y", "mcp-server-mattermost"]
env = { endpoint = "${MATTERMOST_ENDPOINT}", token = "${MATTERMOST_TOKEN}", team = "${MATTERMOST_TEAM}" }
