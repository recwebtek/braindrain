qwen_settings = { source = "RULES.md" }       # .qwen/settings.json
vibe_toml = { source = "RULES.md" }           # .vibe/config.toml
vscode_mcp = { source = "RULES.md" }          # .vscode/mcp.json
windsurf_mcp = { source = "RULES.md" }        # .windsurf/mcp_config.json
