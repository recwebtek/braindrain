# BRAINDRAIN ruler.toml
# Distributed by prime_workspace() or manually via: npx @intellectronica/ruler apply
# BRAINDRAIN_LAUNCHER_PATH is substituted by install.sh / prime_workspace()
# NOTE: `.cursor/agents/` subagent markdown files are deployed by BRAINDRAIN
# prime_workspace from `config/templates/agents/` and are not managed by Ruler.

[ruler]
version = "1"

# ── Agent rule files to generate ─────────────────────────────────────────────
[agents]
claude = { source = "RULES.md" }              # CLAUDE.md
cursor = { source = "RULES.md" }              # .cursor/rules/braindrain.mdc
windsurf = { source = "RULES.md" }            # .windsurf/rules/braindrain.md
copilot = { source = "RULES.md" }             # .github/copilot-instructions.md
zed = { source = "RULES.md" }                 # .zed/settings.json context_servers entry
kiro = { source = "RULES.md" }                # .kiro/steering/braindrain.md
opencode = { source = "RULES.md" }            # .opencode/rules/braindrain.md
gemini = { source = "RULES.md" }              # .gemini/GEMINI.md
aider = { source = "RULES.md" }               # .aider/CONVENTIONS.md
codex = { source = "RULES.md" }               # .codex/AGENTS.md
amp = { source = "RULES.md" }                 # .amp/rules/braindrain.md
goose = { source = "RULES.md" }               # .goose/GOOSE.md
warp = { source = "RULES.md" }                # .warp/AGENTS.md
roo = { source = "RULES.md" }                 # .roo/rules/braindrain.md
cline = { source = "RULES.md" }               # (via .vscode/settings.json cline.mcpServers)
continue = { source = "RULES.md" }            # .continue/rules/braindrain.md
trae = { source = "RULES.md" }                # .trae/rules/project_rules.md
pearai = { source = "RULES.md" }              # .pearai/rules/braindrain.md
void = { source = "RULES.md" }                # .void/rules/braindrain.md
bolt = { source = "RULES.md" }                # .bolt/rules/braindrain.md
idx = { source = "RULES.md" }                 # .idx/rules.json
factory = { source = "RULES.md" }             # .factory/rules/braindrain.md
augment = { source = "RULES.md" }             # .augment/rules/braindrain.md
q = { source = "RULES.md" }                   # .amazonq/rules/braindrain.md
amazonq = { source = "RULES.md" }             # .amazonq/rules/braindrain.md
qwen = { source = "RULES.md" }                # .qwen/rules/braindrain.md
firebender = { source = "RULES.md" }          # .firebender/rules/braindrain.md
mistral = { source = "RULES.md" }             # .mistral/rules/braindrain.md
pi = { source = "RULES.md" }                  # .pi/rules/braindrain.md
jetbrains = { source = "RULES.md" }           # .aiassistant/rules/braindrain.md
junie = { source = "RULES.md" }               # .junie/rules/braindrain.md
jules = { source = "RULES.md" }               # .jules/rules/braindrain.md
kilo = { source = "RULES.md" }                # .kilocode/rules/braindrain.md
crush = { source = "RULES.md" }               # .crush/rules/braindrain.md
openhands = { source = "RULES.md" }           # .openhands/rules/braindrain.md
agentsmd = { source = "RULES.md" }            # .agent/rules/braindrain.md
vibe = { source = "RULES.md" }                # .vibe/rules/braindrain.md
pear = { source = "RULES.md" }                # .pear/rules/braindrain.md
codestory = { source = "RULES.md" }           # .codestory/rules/braindrain.md
aider_conf = { source = "RULES.md" }          # .aider.conf.yml
