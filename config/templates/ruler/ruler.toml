# ── MCP server config propagation ────────────────────────────────────────────
# Ruler writes project-local MCP config for each agent below.
# BRAINDRAIN_LAUNCHER_PATH is replaced at deploy time.
[mcp_servers.braindrain]
command = "BRAINDRAIN_LAUNCHER_PATH"
args = []
env = {}

[mcp_servers.mattermost]
command = "npx"
args = ["-y", "mcp-server-mattermost"]
env = { endpoint = "${MATTERMOST_ENDPOINT}", token = "${MATTERMOST_TOKEN}", team = "${MATTERMOST_TEAM}" }

# ── Agents that accept project-local MCP config ──────────────────────────────
[mcp_targets]
claude = {}       # .mcp.json
cursor = {}       # .cursor/mcp.json
windsurf = {}     # .windsurf/mcp.json
kiro = {}         # .kiro/settings/mcp.json
codex = {}        # .codex/config.toml  [mcp_servers.braindrain]
amp = {}          # .amp/mcp.json
warp = {}         # .warp/mcp.json
trae = {}         # .trae/mcp.json
