# BRAINDRAIN Configuration - MVP
# Version: 1.0.3

version: "1.0.3"
project_name: "braindrain"

# ─── MODULES ─────────────────────────────────────────────────────
modules:
  tool_gate:
    enabled: true
    beta_features:
      advanced_tool_use: true
      defer_loading: true
      prompt_caching: true
    # Optional rerank on search_index (OFF by default — search uses context-mode FTS only)
    rerank_on_search: false
    # none | lexical (offline) | mixedbread (cloud) | auto (cloud if key else lexical)
    rerank_provider: none
    rerank_model: "mixedbread-ai/mxbai-rerank-base-v2"
    rerank_top_k: 5

  output_sandbox:
    enabled: true
    backend: context_mode
    enforce_hooks: true

  workflow_engine:
    enabled: true # Phase 3: Workflow engine

  context_database:
    enabled: false # Deferred custom DB module; L0–L3 ship natively (observer/sessions/wiki_brain/dreaming)

  env_context:
    enabled: true
    cache_path: ~/.braindrain/env_context.json
    hot: true # always loaded — it's tiny (~400 tokens)
    description: >
      OS environment fingerprint. Provides identity, network, shell, runtimes,
      editors, CLI tools, and agent behaviour hints. Zero discovery cost after
      first probe. Re-run via refresh_env_context when env changes.

# ─── MCP TOOLS ─────────────────────────────────────────────────
mcp_tools:
  # HOT: context-mode (always loaded - intercepts all outputs)
  - name: context_mode
    transport: stdio
    command: "npx -y context-mode@1.0.162"
    hot: true
    defer_loading: false
    tags: [sandbox, output, compression, fts5, session]
    description: "Output sandbox with FTS5 index. Routes all tool outputs through search."
    token_weight: negligible

  # HOT: env context (always loaded — deterministic OS fingerprint, zero API cost)
  - name: get_env_context
    hot: true
    defer_loading: false
    tags: [os, environment, shell, identity, network, tools, runtimes]
    description: >
      Return cached OS environment snapshot: hostname, LAN IPs, username,
      shell, package manager, runtimes, editors, CLI tools, agent hints.
      Use refresh=True to re-probe after environment changes.

  - name: refresh_env_context
    hot: false
    defer_loading: true
    tags: [os, environment, probe, refresh, onboarding]
    description: >
      Re-run full OS probe and update cached env context.
      Only needed after installing new tools or changing machines.

  # DEFERRED: Codebase tools (loaded on-demand via search_tools)
  - name: repo_mapper
    transport: stdio
    command: "python3 /usr/local/bin/repomap_server.py"
    defer_loading: true
    tags: [codebase, symbols, graph, map, pagerank, tree-sitter]
    description: "PageRank dependency graph + token-budgeted repo map."
    input_examples:
      - { path: "./src", token_budget: 2000 }
      - { path: "./src", token_budget: 1000, include_tests: false }
    token_weight: low

  - name: jcodemunch
    transport: stdio
    command: "uvx jcodemunch-mcp==1.108.53"
    defer_loading: true
    tags: [codebase, symbols, retrieval, search, function, class]
    description: "Surgical symbol-level retrieval. Respects token_budget."
    input_examples:
      - { query: "auth functions", token_budget: 1500 }
      - { symbol: "UserModel", include_dependencies: true }
    token_weight: low

  # GitHub MCP (deferred - 26K tokens if loaded)
  - name: github
    transport: stdio
    command: "npx -y @modelcontextprotocol/server-github@2025.4.8"
    defer_loading: true
    hot_tools: [create_pull_request]
    tags: [git, pr, issues, commits, review]
    roles: [project-comms]
    bundles: [comms]
    description: "GitHub operations: PR creation, issue management, code review."
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
    token_weight: high

  # DEFERRED: codebase distillation (high ROI for big repos)
  - name: ai_distiller
    transport: stdio
    command: "npx -y @janreges/ai-distiller-mcp@1.4.0"
    defer_loading: true
    tags: [codebase, distillation, api, compression, tree-sitter]
    description: "Distills codebases to public APIs/types (90%+ context reduction on large repos)."
    token_weight: low

  # DEFERRED: token-efficient editing (line-range reads + safe patching)
  - name: text_editor
    transport: stdio
    command: "uvx mcp-text-editor==1.0.2"
    defer_loading: true
    tags: [editing, line-oriented, patching, token-efficient]
    description: "Line-oriented text editing server to avoid full-file reads."
    token_weight: low

  # DEFERRED: dependency-aware file importance scoring
  - name: filescope
    transport: stdio
    # Install/build: https://github.com/admica/FileScopeMCP then point to the built server entry.
    # Example: node /path/to/FileScopeMCP/mcp-server.js --base-dir=/path/to/project
    command: "node ${FILESCOPE_MCP_SERVER_JS:-/usr/local/bin/filescope-mcp-server.js} --base-dir=${FILESCOPE_BASE_DIR:-.}"
    defer_loading: true
    tags: [dependency-graph, file-importance, visualization, mermaid]
    description: "Scores files by importance from dependency graph; can output Mermaid diagrams."
    token_weight: medium

  # DEFERRED: semantic search / chunk retrieval
  - name: sourcerer
    transport: stdio
    command: "sourcerer"
    defer_loading: true
    tags: [semantic-search, embeddings, code-navigation]
    description: "Semantic code search MCP (local-first fallback, optional cloud embeddings)."
    env:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OLLAMA_HOST: "${OLLAMA_HOST}"
    token_weight: medium

# ─── WORKFLOWS ─────────────────────────────────────────────────
# ─── WORKFLOWS ─────────────────────────────────────────────────
workflows:
  - name: prime_cursor_orchestration
    description: "Prime workspace for Cursor planning — rules, agents, hooks, skills, audit scripts."
    steps:
      - braindrain.prime_workspace
    executes_in: sandbox
    model: tier_local
    token_budget: 800
    plan_before_run: false
    input_examples:
      - { path: ".", dry_run: false }
      - { path: ".", dry_run: true, sync_templates: true, sync_subagents: true }

  - name: init_project_memory
    description: "Initialize durable project memory artifacts for continual-learning."
    steps:
      - braindrain.init_project_memory
    executes_in: sandbox
    model: tier_local
    token_budget: 500
    plan_before_run: false
    input_examples:
      - { path: ".", dry_run: false }
      - { path: ".", dry_run: true }

  - name: ingest_codebase
    description: "Full codebase indexing. Run once per project, then use incremental."
    steps:
      - ai_distiller.distill
      - repo_mapper.generate
      - jcodemunch.index
    options:
      # Run distiller first only when the tree is large enough to benefit
      distiller_when_file_count_gt: 200
    executes_in: sandbox
    model: tier_local
    token_budget: 2000
    plan_before_run: false
    input_examples:
      - { path: "./src", mode: "new_project" }
      - { path: "./src", mode: "incremental", since_commit: "HEAD~10" }

  - name: refactor_prep_token_light
    description: "Token-light prep: filescope + line editor; heavy map only when budget allows."
    steps:
      - filescope.analyze
      - text_editor.get_project_structure
      - repo_mapper.dependency_graph
      - jcodemunch.get_affected_symbols
    options:
      include_repo_mapper_when_token_budget_gte: 2000
    executes_in: sandbox
    model: tier_local
    token_budget: 1500
    plan_before_run: true
    input_examples:
      - { path: ".", token_budget: 1200, change_description: "rename auth helper" }
      - { path: "./src", token_budget: 2500, files: ["./src/auth/"] }

  - name: refactor_prep
    description: "Blast radius analysis: affected files/symbols for a proposed change."
    steps:
      - repo_mapper.dependency_graph
      - jcodemunch.get_affected_symbols
    executes_in: sandbox
    model: tier_local
    token_budget: 3000
    plan_before_run: true
    input_examples:
      - { files: ["./auth/"], change_description: "migrate to JWT" }
      - { symbol: "UserModel", change_type: "schema_change" }

# ─── MODEL TIERS (for later phases) ───────────────────────────
models:
  tier_micro:
    provider: ollama
    model: llama3.2:1b
    api_base: http://localhost:11434
    use_for: [history_compression, classification]
    cost_per_1k: 0.0
    max_tokens: 2048

  tier_local:
    provider: lm_studio
    model: qwen3:4b
    api_base: "${LMSTUDIO_API_BASE:-http://localhost:1234/v1}"
    use_for: [routing, extraction, simple_tasks]
    cost_per_1k: 0.0
    max_tokens: 8192

# ─── EMBEDDINGS (optional — NOT required for search_index / search_tools) ─────
# search_index → context-mode FTS5. search_tools → BM25 over MCP catalog.
# Embeddings below are for future semantic workflows only; local providers are tried first.
embeddings:
  default_provider: lmstudio_local
  default_model: "${EMBEDDINGS_MODEL:-text-embedding-3-small}"
  rerank:
    # Matches tool_gate.rerank_provider when set; see rerank.py
    provider: none
    model: "${MIXEDBREAD_RERANK_MODEL:-mixedbread-ai/mxbai-rerank-base-v2}"
  providers:
    # Local-first: LM Studio OpenAI-compatible /v1/embeddings
    - name: lmstudio_local
      kind: openai_compat
      base_url: "${LMSTUDIO_BASE_URL:-http://localhost:1234/v1}"
      api_key_env: "LMSTUDIO_API_KEY"
      model: "${LMSTUDIO_EMBED_MODEL:-text-embedding-3-small}"
      priority: 10

    # Local: Ollama /api/embed (e.g. nomic-embed-text, mxbai-embed-large)
    - name: ollama_local
      kind: ollama
      base_url: "${OLLAMA_HOST:-http://localhost:11434}"
      model: "${OLLAMA_EMBED_MODEL:-nomic-embed-text}"
      priority: 15

    # Google AI Studio (generous free tier) via OpenAI-compatible gateway if you run one,
    # or wire directly in Phase 3 if not.
    - name: google_aistudio
      kind: openai_compat
      base_url: "${GOOGLE_AISTUDIO_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}"
      api_key_env: "GOOGLE_AISTUDIO_API_KEY"
      model: "${GOOGLE_AISTUDIO_EMBED_MODEL:-text-embedding-004}"
      priority: 20

    # Hugging Face Inference (or compatible gateway)
    - name: huggingface
      kind: hf_inference
      base_url: "${HUGGINGFACE_BASE_URL:-https://api-inference.huggingface.co}"
      api_key_env: "HUGGINGFACE_API_KEY"
      model: "${HUGGINGFACE_EMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}"
      priority: 30

    # Mixedbread (embeddings + rerankers)
    - name: mixedbread
      kind: openai_compat
      base_url: "${MIXEDBREAD_BASE_URL:-https://api.mixedbread.ai/v1}"
      api_key_env: "MIXEDBREAD_API_KEY"
      model: "${MIXEDBREAD_EMBED_MODEL:-mxbai-embed-large-v1}"
      priority: 40

# ─── OBSERVER (episodic tool_call events) ─────────────────────────
observer:
  enabled: true
  storage_path: ~/.braindrain/events.db
  ring_buffer_max: 10000
  wrap_all_tools: true
  hash_args: true

# ─── MEMORY PROMOTION GUARDRAILS ───────────────────────────────
memory_learning:
  promotion:
    reject_secrets: true
    reject_transient_state: true
    require_repeat_observation: 1
    require_grounded_evidence: false
    min_confidence: 0.0
    # transient_markers default: [today, just now, temporary, debug only]

# ─── SESSIONS (L1 telemetry + compaction) ──────────────────────
sessions:
  storage_path: ~/.braindrain/sessions.db
  inactivity_timeout_minutes: 30

# ─── WIKI-BRAIN (L2 durable semantic/procedural/lesson store) ──
wiki_brain:
  storage_path: ~/.braindrain/wiki-brain/brain.db
  recall:
    similarity_weight: 0.5
    recency_weight: 0.3
    importance_weight: 0.2
    recency_half_life_days: 30.0
  forgetting:
    decay_half_life_days: 90.0
    prune_threshold: 0.05
    consolidation_similarity: 0.92

# ─── LESSONS (critique-backed playbook promotion) ──────────────
lessons:
  promotion:
    require_grounded_evidence: true # evaluate_lesson_candidate forces this on
    min_confidence: 0.0

# ─── DREAMING (L3 consolidation) ───────────────────────────────
dreaming:
  policy_version: memory-lessons-v1
  quiet_minutes: 30
  lookback_hours: 72
  max_episode_scan: 50
  max_event_scan: 250
  max_session_scan: 20
  deep: {}
  storage:
    base_dir: ~/.braindrain/dreaming
  weights:
    frequency: 0.24
    relevance: 0.30
    query_diversity: 0.15
    recency: 0.15
    consolidation: 0.10
    conceptual_richness: 0.06
  triggers:
    macos_host_idle:
      enabled: false # manual opt-in; does not install/start launchd watcher
      mode: full
      idle_threshold_seconds: 300
      poll_interval_seconds: 120
      bypass_session_quiet: true
      cooldown_minutes: 60

# ─── PROVIDER CONTEXT BOUNDARY ─────────────────────────────────
provider_context:
  strategy: provider-native-first

# ─── PLANNING AUDITOR (daily_plan_audit.py / /masterplan) ───────
# Defaults are safe/off. CLI flags (--apply-*) override these for one-off runs.
planning_auditor:
  overlap_jaccard_threshold: 0.55
  apply_overlap_relations: false
  apply_goal_tags: false
  goal_alignment_min_score: 40

# ─── COST TRACKING ─────────────────────────────────────────────
cost_tracking:
  enabled: true
  log_file: ~/.braindrain/costs/session.jsonl
  estimator: chars # chars | tiktoken
  route_threshold_chars: 4096
  auto_route_output: true
  rates:
    input_per_1m: 1.25
    output_per_1m: 6.0
    cache_read_per_1m: 0.25
  track_fields:
    - tokens_in_raw
    - tokens_in_actual
    - tokens_saved
    - cost_avoided_usd
    - cache_hits
    - module_attribution
  alert_threshold_usd_per_session: 0.50
  dashboard: true

# ─── MODEL PROVENANCE ───────────────────────────────────────────
# Controls model/date attribution in chat, plans, and subagent traces.
provenance:
  enabled: true
  date_format: "%Y-%m-%d"
  chat_footer:
    enabled: true
    scope: all_agents # all_agents | planning_only | off
  plan_metadata:
    enabled: true
  subagent_trace:
    enabled: true
    path: ".braindrain/plan-reports/model-trace.jsonl"
